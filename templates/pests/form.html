{% extends "base.html" %}
{% block title %}{{ 'Edit' if pest else 'Add' }} Pest{% endblock %}
{% block content %}
<h1>{{ 'Edit' if pest else 'Add' }} Pest</h1>
<form method="post">
    <div class="mb-2">
        <label class="form-label">Common Name</label>
        <input type="text" name="common_name" class="form-control" value="{{ pest.common_name if pest else '' }}" required>
    </div>
    <div class="mb-2">
        <label class="form-label">Scientific Name</label>
        <input type="text" name="scientific_name" class="form-control" value="{{ pest.scientific_name if pest else '' }}">
    </div>
    <div class="mb-2">
        <label class="form-label">Pest Type</label>
        <input type="text" name="pest_type" class="form-control" value="{{ pest.pest_type if pest else '' }}" placeholder="e.g. insect, disease">
    </div>
    <div class="mb-2">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2">{{ pest.description if pest else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a class="btn btn-secondary" href="{{ url_for('pests_list') }}">Cancel</a>
</form>
{% endblock %}
