{% extends "base.html" %}
{% block title %}{{ 'Edit' if region else 'Add' }} Region{% endblock %}
{% block content %}
<h1>{{ 'Edit' if region else 'Add' }} Region</h1>
<form method="post">
    <div class="mb-2">
        <label class="form-label">State Code</label>
        <input type="text" name="state_code" class="form-control" value="{{ region.state_code if region else '' }}" required>
    </div>
    <div class="mb-2">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ region.name if region else '' }}" required>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a class="btn btn-secondary" href="{{ url_for('regions_list') }}">Cancel</a>
</form>
{% endblock %}
