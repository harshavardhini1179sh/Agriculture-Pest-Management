{% extends "base.html" %}
{% block title %}{{ 'Edit' if treatment else 'Add' }} Treatment{% endblock %}
{% block content %}
<h1>{{ 'Edit' if treatment else 'Add' }} Treatment</h1>
<form method="post">
    <div class="mb-2">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ treatment.name if treatment else '' }}" required>
    </div>
    <div class="mb-2">
        <label class="form-label">Type</label>
        <input type="text" name="type" class="form-control" value="{{ treatment.type if treatment else '' }}" placeholder="chemical, biological, cultural">
    </div>
    <div class="mb-2">
        <label class="form-label">Cost per Acre</label>
        <input type="number" step="0.01" name="cost_per_acre" class="form-control" value="{{ treatment.cost_per_acre if treatment else '' }}">
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a class="btn btn-secondary" href="{{ url_for('treatments_list') }}">Cancel</a>
</form>
{% endblock %}
