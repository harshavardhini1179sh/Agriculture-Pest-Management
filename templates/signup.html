{% extends "base.html" %}
{% block title %}Farmer Sign Up{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-3">Farmer Sign Up</h1>
        <div class="card">
            <div class="card-body">
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-warning mb-3" role="alert">
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}
                <form method="post" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full name</label>
                        <input type="text" class="form-control" id="name" name="name" required
                               value="{{ request.form.name if request.form else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               value="{{ request.form.email if request.form else '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="4">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-success">Sign up</button>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary ms-2">Already have an account? Log in</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
